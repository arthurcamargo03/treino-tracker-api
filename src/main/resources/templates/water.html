<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hidratação · Treino Tracker</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='50' font-size='48'%3E%F0%9F%8F%8B%EF%B8%8F%3C/text%3E%3C/svg%3E">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container pb-5">
    <h1 class="h3 page-title">Hidratação</h1>

    <div id="alert-box" class="alert d-none" role="alert"></div>

    <div class="row g-4">
        <div class="col-lg-5 text-center">
            <div class="water-ring-wrapper mx-auto">
                <svg viewBox="0 0 120 120" class="water-ring">
                    <g id="ring-segments"></g>
                </svg>
                <div class="water-ring-label">
                    <div class="fs-3 fw-bold" id="ring-percent">0%</div>
                    <div class="text-muted small" id="ring-amounts">0 / 0 ml</div>
                </div>
            </div>
            <p class="water-bottle-summary" id="bottle-summary">Carregando hidratação...</p>
            <div>
                <span id="goal-badge" class="badge trend-positive mt-3 d-none">Meta atingida</span>
            </div>

            <div class="d-flex flex-column gap-2 mt-4">
                <button id="drink-bottle-btn" class="btn btn-primary btn-lg">Bebi uma garrafa</button>
                <form id="drink-custom-form" class="input-group" novalidate>
                    <input type="number" min="1" class="form-control" id="custom-ml" data-field="ml" placeholder="ml customizado">
                    <button class="btn btn-outline-primary" type="submit">Registrar</button>
                </form>
            </div>
        </div>

        <div class="col-lg-7">
            <form id="settings-form" class="card card-body shadow-sm" novalidate>
                <h2 class="h6 text-muted">Ajustar meta e garrafa</h2>
                <div class="row g-3">
                    <div class="col-6">
                        <label class="form-label" for="daily-goal">Meta diária</label>
                        <div class="input-group">
                            <input type="number" min="1" class="form-control" id="daily-goal" data-field="dailyGoalMl" required>
                            <span class="input-group-text">ml</span>
                        </div>
                        <small id="goal-today-hint" class="form-text text-muted d-none"></small>
                    </div>
                    <div class="col-6">
                        <label class="form-label" for="bottle-size">Tamanho da garrafa</label>
                        <div class="input-group">
                            <input type="number" min="1" class="form-control" id="bottle-size" data-field="bottleSizeMl" required>
                            <span class="input-group-text">ml</span>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary mt-3">Salvar configurações</button>
                <p class="text-muted small mt-2 mb-0">
                    A meta do registro de hoje fica fixa no valor com que o dia começou; uma meta nova vale a
                    partir de quando for salva (ou no próximo dia, se o de hoje já tiver sido criado).
                </p>
            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/water.js?v=water-polish-2"></script>
</body>
</html>
