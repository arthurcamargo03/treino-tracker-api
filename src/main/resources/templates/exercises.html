<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Exercícios · Treino Tracker</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='50' font-size='48'%3E%F0%9F%8F%8B%EF%B8%8F%3C/text%3E%3C/svg%3E">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container pb-5">
    <h1 class="h3 page-title">Exercícios</h1>

    <div id="alert-box" class="alert d-none" role="alert"></div>

    <div class="row g-3 mb-4">
        <div class="col-lg-8">
            <form id="add-exercise-form" class="card card-body shadow-sm h-100" novalidate>
                <h2 class="h6 text-muted">Adicionar exercício</h2>
                <div class="row g-2">
                    <div class="col-md-4">
                        <label class="form-label">Nome</label>
                        <input type="text" class="form-control" id="exercise-name" data-field="name" required placeholder="Supino reto">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Grupo muscular</label>
                        <input type="text" class="form-control" id="exercise-group" data-field="muscleGroup" required placeholder="Peito">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Treino do dia</label>
                        <select class="form-select" id="exercise-training-day" data-field="trainingDayId" required>
                            <option value="" disabled selected>Selecione um treino...</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label" for="exercise-series-validas">Séries válidas</label>
                        <input type="number" min="1" step="1" class="form-control" id="exercise-series-validas"
                               data-field="seriesValidas" value="3" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary mt-3">Adicionar</button>
            </form>
        </div>
        <div class="col-lg-4">
            <form id="add-training-day-form" class="card card-body shadow-sm h-100" novalidate>
                <h2 class="h6 text-muted">Novo treino</h2>
                <label class="form-label">Nome</label>
                <input type="text" class="form-control mb-2" id="training-day-name" data-field="name" required placeholder="Treino A — Peito">
                <label class="form-label">Dia da semana</label>
                <select class="form-select mb-2" id="training-day-of-week" data-field="dayOfWeek" required>
                    <option value="MONDAY">Segunda-feira</option>
                    <option value="TUESDAY">Terça-feira</option>
                    <option value="WEDNESDAY">Quarta-feira</option>
                    <option value="THURSDAY">Quinta-feira</option>
                    <option value="FRIDAY">Sexta-feira</option>
                    <option value="SATURDAY">Sábado</option>
                    <option value="SUNDAY">Domingo</option>
                </select>
                <button type="submit" class="btn btn-outline-primary">Criar treino</button>
            </form>
        </div>
    </div>

    <div id="day-nav" class="d-flex flex-wrap gap-2 mb-4"></div>

    <div id="exercise-groups">
        <div class="loading-state">Carregando exercícios...</div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/exercises.js?v=series-delete-1"></script>
</body>
</html>
