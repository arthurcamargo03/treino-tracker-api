<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Exercícios · Treino Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container pb-5">
    <h1 class="h3 mb-3">Exercícios</h1>

    <div id="alert-box" class="alert d-none" role="alert"></div>

    <form id="add-exercise-form" class="card card-body shadow-sm mb-4">
        <h2 class="h6 text-muted">Adicionar exercício</h2>
        <div class="row g-2">
            <div class="col-md-5">
                <label class="form-label">Nome</label>
                <input type="text" class="form-control" id="exercise-name" required placeholder="Supino reto">
            </div>
            <div class="col-md-5">
                <label class="form-label">Grupo muscular</label>
                <input type="text" class="form-control" id="exercise-group" required placeholder="Peito">
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button type="submit" class="btn btn-primary w-100">Adicionar</button>
            </div>
        </div>
    </form>

    <div id="exercise-cards" class="row g-3">
        <p class="text-muted">Carregando exercícios...</p>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/exercises.js"></script>
</body>
</html>
