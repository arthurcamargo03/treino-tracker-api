<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Detalhe do exercício · Treino Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>
<body th:attr="data-exercise-id=${exerciseId}">
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container pb-5">
    <a href="/exercises" class="btn btn-link ps-0 mb-2">&larr; Voltar</a>

    <div class="page-heading d-flex justify-content-between align-items-center flex-wrap gap-2">
        <h1 class="h3 page-title" id="exercise-title">Carregando...</h1>
    </div>

    <div id="alert-box" class="alert d-none" role="alert"></div>

    <div class="row g-4">
        <div class="col-lg-5">
            <form id="log-set-form" class="card card-body shadow-sm" novalidate>
                <h2 class="h6 text-muted">Registrar série</h2>
                <div class="row g-2">
                    <div class="col-6">
                        <label class="form-label">Semana</label>
                        <input type="number" min="1" class="form-control" id="set-week" data-field="week" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label">Carga (kg)</label>
                        <input type="text" inputmode="decimal" class="form-control" id="set-weight" data-field="weight" required placeholder="60,5">
                    </div>
                    <div class="col-6">
                        <label class="form-label">Repetições</label>
                        <input type="number" min="1" class="form-control" id="set-reps" data-field="reps" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label">Séries</label>
                        <input type="number" min="1" class="form-control" id="set-sets" data-field="sets" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary mt-3">Registrar série</button>
            </form>

            <div class="table-responsive mt-4">
                <table class="table table-sm table-striped align-middle progression-table">
                    <thead>
                    <tr>
                        <th>Semana</th>
                        <th>Carga</th>
                        <th>Reps</th>
                        <th>Séries</th>
                        <th>1RM</th>
                        <th>Variação</th>
                    </tr>
                    </thead>
                    <tbody id="progression-table-body">
                    <tr>
                        <td colspan="6" class="text-muted">Sem dados ainda.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card card-body shadow-sm h-100 chart-card">
                <div class="chart-heading">
                    <h2 class="h6 text-muted mb-0">1RM estimado por semana (fórmula de Epley)</h2>
                    <span id="trend-badge" class="badge trend-badge d-none"></span>
                </div>
                <div class="chart-frame">
                    <canvas id="rm-chart" height="280"></canvas>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/exercise-detail.js"></script>
</body>
</html>
