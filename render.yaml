databases:
  - name: treino-tracker-db
    plan: free
    region: oregon
    postgresMajorVersion: "16"

services:
  - type: web
    name: treino-tracker-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/exercises
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PGHOST
        fromDatabase:
          name: treino-tracker-db
          property: host
      - key: PGPORT
        fromDatabase:
          name: treino-tracker-db
          property: port
      - key: PGDATABASE
        fromDatabase:
          name: treino-tracker-db
          property: database
      - key: PGUSER
        fromDatabase:
          name: treino-tracker-db
          property: user
      - key: PGPASSWORD
        fromDatabase:
          name: treino-tracker-db
          property: password
